<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow">
  <title>ADELIE Form Definitions</title>
</head>
<body hidden>
  <form name="ai-lead" method="POST" data-netlify="true" netlify-honeypot="bot-field">
    <input type="hidden" name="form-name" value="ai-lead">
    <input name="bot-field">
    <input name="name">
    <input name="email" type="email">
    <input name="phone">
    <input name="property_address">
    <input name="city">
    <input name="project_type">
    <input name="budget_range">
    <input name="timeline">
    <textarea name="project_details"></textarea>
    <textarea name="assistant_transcript"></textarea>
    <input name="contact_consent">
    <input name="lead_source">
    <input name="page_url">
    <input name="submitted_at">
  </form>

  <form name="interactive-project-planner-start" method="POST" data-netlify="true">
    <input type="hidden" name="form-name" value="interactive-project-planner-start">
    <input name="name"><input name="phone"><input name="email">
    <input name="property_address"><input name="project_type">
    <input name="project_name"><input name="lead_stage">
    <input name="contact_consent"><input name="page_url">
    <input name="started_at">
  </form>

  <form name="interactive-project-planner-complete" method="POST" data-netlify="true">
    <input type="hidden" name="form-name" value="interactive-project-planner-complete">
    <input name="name"><input name="phone"><input name="email">
    <input name="property_address"><input name="project_name">
    <input name="project_type"><input name="budget_range">
    <input name="desired_start"><input name="room_count">
    <input name="room_names"><textarea name="project_summary"></textarea>
    <textarea name="binder_json"></textarea><input name="contact_consent">
    <input name="lead_stage"><input name="submitted_at">
    <input name="readiness_score"><input name="lead_quality_score">
    <input name="estimated_cost_range"><textarea name="generated_summary"></textarea>
    <input name="uploaded_file_names">
  </form>
</body>
</html>
