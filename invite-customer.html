<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Create Customer Login | ADELIE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="portal.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
</script>
<script src="portal-config.js">
</script>
</head>
<body class="portal-body">
<div class="portal-shell">
<header class="portal-topbar">
<a class="portal-brand" href="portal-admin.html">
<img src="assets/adelie-logo.png" alt="ADELIE Construction">
<strong>Create Customer Login</strong>
</a>
<a class="portal-btn light" href="portal-admin.html">Back to Overview</a>
</header>
<main class="invite-page">
<section class="portal-card invite-standalone">
<p class="portal-kicker">Customer access</p>
<h1 class="portal-title">Create a customer login</h1>
<p class="portal-muted">Choose their project, create a username, and assign a temporary password.</p>
<div id="invite-message" class="notice hidden">
</div>
<form id="invite-form" class="portal-form">
<label>Project<select id="invite-project" required>
</select>
</label>
<label>Username<input id="invite-username" type="text" minlength="3" maxlength="32" pattern="[A-Za-z0-9._-]+" required autocomplete="off" placeholder="smith-family">
</label>
<label>Temporary password<input id="invite-password" type="password" minlength="10" required autocomplete="new-password">
</label>
<button class="portal-btn primary" type="submit">Create Customer Login</button>
</form>
<p class="portal-muted invite-help">Share the username and temporary password privately. Creating the same username again updates its password and project access.</p>
</section>
</main>
</div>
<script src="invite-customer.js">
</script>
</body>
</html>
