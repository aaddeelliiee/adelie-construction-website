[build]
  publish = "."

# Keep the public URL format aligned with the canonical tags and sitemap.
# Netlify's Pretty URLs processing otherwise exposes both /page and /page.html,
# and rewrites /page.html/ to the non-canonical extensionless version.
[build.processing.html]
  pretty_urls = false

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
