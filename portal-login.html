<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ADELIE Client Portal Login</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"><link rel="stylesheet" href="portal.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="portal-config.js"></script></head><body class="portal-body"><main class="login-wrap"><section class="login-card"><img src="assets/adelie-logo.png" alt="ADELIE Construction"><p class="portal-kicker">Secure homeowner access</p><h1 class="portal-title">Client Portal</h1><p class="portal-muted">Access your project schedule, documents, change orders, invoices, photos, updates, and warranty information.</p><div id="login-message" class="notice hidden"></div><form id="login-form" class="portal-form"><label>Email<input type="email" id="email" autocomplete="email" required></label><label>Password<input type="password" id="password" autocomplete="current-password" required></label><button class="portal-btn primary" type="submit">Sign In</button><button class="portal-btn light" type="button" id="magic-link">Email Me a Sign-In Link</button><button class="portal-btn light" type="button" id="forgot-password">Reset Password</button></form><p class="portal-muted" style="font-size:.85rem">Accounts are invitation-only. Contact <a href="mailto:hello@adelieconstruction.com">hello@adelieconstruction.com</a> for access.</p><a href="index.html" class="portal-btn dark" style="width:100%">Return to ADELIEConstruction.com</a></section></main><script src="portal-login.js"></script></body></html>
